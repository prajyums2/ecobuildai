<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="EcoBuild - Lifecycle Decision Support System for Sustainable Construction"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>EcoBuild | GEC Thrissur</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // Suppress MetaMask and other extension errors
      window.addEventListener('error', function(e) {
        if (e.message && (
          e.message.includes('MetaMask') || 
          e.message.includes('ethereum') ||
          e.message.includes('Failed to connect')
        )) {
          e.preventDefault();
          e.stopPropagation();
          console.warn('Suppressed MetaMask error:', e.message);
        }
      });
    </script>
  </body>
</html>
